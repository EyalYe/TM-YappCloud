# Component manifest for the "Yapp" device app (direct Todoist).
# taskmaster_core is provided locally by the firmware build (plain CMake REQUIRES).
# cJSON isn't bundled in IDF v6, so pull it from the component registry.
version: "0.1.0"
description: "TaskMaster-C3 'Yapp' task source app (direct Todoist)"
targets:
  - esp32c3
dependencies:
  espressif/cjson: "^1.7"
